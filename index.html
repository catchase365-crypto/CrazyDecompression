<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D 流浪刷子 - 解压触控</title>
    <style>
        /* 基础重置 */
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #0f0f0f;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            touch-action: none; /* 防止移动端拖拽刷新和滚动 */
        }

        /* 静态流体背景容器，放置于 body 最顶部 */
        .bg-circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.75;
            animation: breathe 10s infinite alternate ease-in-out;
        }

        /* 严格遵守的 5 个绝对定位圆角与颜色尺寸设定 */
        .circle-1 { top: -20vh; left: -20vw; background: #50C878; width: max(60vw, 60vh); height: max(60vw, 60vh); } /* 翠绿 */
        .circle-2 { top: -20vh; right: -20vw; background: #8A2BE2; width: max(60vw, 60vh); height: max(60vw, 60vh); } /* 紫罗兰 */
        .circle-3 { bottom: -20vh; left: -20vw; background: #006994; width: max(60vw, 60vh); height: max(60vw, 60vh); } /* 海蓝 */
        .circle-4 { bottom: -20vh; right: -20vw; background: #FF00FF; width: max(60vw, 60vh); height: max(60vw, 60vh); } /* 洋红 */
        .circle-5 { 
            top: 50%; left: 50%; 
            transform: translate(-50%, -50%); 
            background: #FFB300; /* 橙黄 */
            width: max(50vw, 50vh); 
            height: max(50vw, 50vh); 
        } 

        /* 液体毛玻璃主题主容器 */
        .glass-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            backdrop-filter: blur(30px) saturate(150%);
            -webkit-backdrop-filter: blur(30px) saturate(150%);
            background: rgba(20, 20, 20, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* UI 提示层 */
        #ui-layer {
            position: absolute;
            pointer-events: none;
            text-align: center;
            transition: opacity 0.6s ease;
            z-index: 10;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        #ui-layer h1 {
            font-weight: 300;
            letter-spacing: 4px;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        #ui-layer p {
            font-size: 1rem;
            opacity: 0.8;
            letter-spacing: 2px;
            animation: pulse 2s infinite;
        }

        /* 简单的动画效果 */
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
        }
        
        @keyframes breathe {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }
    </style>
</head>
<body>

    <div class="bg-circle circle-1"></div>
    <div class="bg-circle circle-2"></div>
    <div class="bg-circle circle-3"></div>
    <div class="bg-circle circle-4"></div>
    <div class="bg-circle circle-5"></div>

    <div class="glass-container" id="container">
        <div id="ui-layer">
            <h1>流浪刷子</h1>
            <p>长按屏幕 开始解压</p>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // --- 1. Three.js 基础设置 ---
        const container = document.getElementById('container');
        const uiLayer = document.getElementById('ui-layer');
        
        const scene = new THREE.Scene();
        // 设置背景透明以透出底部的毛玻璃与液体色彩
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 25;

        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // 优化移动端性能
        container.appendChild(renderer.domElement);

        // --- 2. 创建 3D 流浪刷子 (实例化网格提升性能) ---
        const trailLength = 600; // 刷子的长度/粒子数
        const geometry = new THREE.IcosahedronGeometry(0.6, 2); // 圆滑的多面体作为刷毛
        const material = new THREE.MeshPhysicalMaterial({
            color: 0xffffff,
            roughness: 0.1,
            metalness: 0.5,
            transmission: 0.5, // 玻璃质感
            thickness: 1.0
        });

        const instancedMesh = new THREE.InstancedMesh(geometry, material, trailLength);
        scene.add(instancedMesh);

        // 轨迹状态存储
        let trail = new Array(trailLength).fill(null).map(() => new THREE.Vector3(0, 0, 0));
        const dummy = new THREE.Object3D();
        const colorObj = new THREE.Color();

        // 添加柔和的光照
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        
        const pointLight = new THREE.PointLight(0xffffff, 1.2);
        pointLight.position.set(15, 15, 15);
        scene.add(pointLight);

        // --- 3. 交互与震动逻辑 ---
        let isTouching = false;
        let time = 0;
        let vibrateInterval;

        function startInteraction(e) {
            if (e.type === 'touchstart') e.preventDefault();
            if (isTouching) return;
            
            isTouching = true;
            uiLayer.style.opacity = '0'; // 隐藏 UI
            
            // 初始触觉反馈
            if (navigator.vibrate) navigator.vibrate(20);
            
            // 连续短促震动模拟“刷子摩擦”感
            vibrateInterval = setInterval(() => {
                if (navigator.vibrate) navigator.vibrate(10);
            }, 80);
        }

        function stopInteraction() {
            isTouching = false;
            uiLayer.style.opacity = '1'; // 恢复 UI
            clearInterval(vibrateInterval);
        }

        // 绑定事件 (兼容手机触摸与电脑鼠标)
        window.addEventListener('mousedown', startInteraction);
        window.addEventListener('touchstart', startInteraction, { passive: false });
        window.addEventListener('mouseup', stopInteraction);
        window.addEventListener('touchend', stopInteraction);
        window.addEventListener('mouseleave', stopInteraction);

        // 窗口缩放适配
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- 4. 动画循环 ---
        function animate() {
            requestAnimationFrame(animate);

            if (isTouching) {
                // 当按住时，时间流逝，刷子移动
                time += 0.025;

                // 使用李萨如曲线 (Lissajous curve) 生成令人极度舒适的数学无限循环轨迹
                const x = Math.sin(time * 1.3) * 10 + Math.cos(time * 2.1) * 4;
                const y = Math.cos(time * 1.7) * 8 + Math.sin(time * 0.9) * 5;
                const z = Math.sin(time * 2.5) * 6;

                // 更新轨迹：移除最旧的点，加入新的刷头点
                trail.pop();
                trail.unshift(new THREE.Vector3(x, y, z));
                
                // 视角跟随微调，增加沉浸感
                camera.position.x += (x * 0.2 - camera.position.x) * 0.05;
                camera.position.y += (y * 0.2 - camera.position.y) * 0.05;
                camera.lookAt(0, 0, 0);
            } else {
                // 松开时，场景缓慢自转，产生悬停的优美感
                scene.rotation.y += 0.003;
                scene.rotation.x += 0.001;
            }

            // 渲染实例网格 (计算每个粒子的位置、大小和颜色)
            for (let i = 0; i < trailLength; i++) {
                const pos = trail[i];
                dummy.position.copy(pos);
                
                // 越靠近尾部越细，形成画笔拖尾感
                const scale = Math.max(0.001, 1 - Math.pow(i / trailLength, 1.5));
                dummy.scale.set(scale, scale, scale);

                // 让粒子有轻微的自转
                dummy.rotation.x = time + i * 0.1;
                dummy.rotation.y = time + i * 0.05;

                dummy.updateMatrix();
                instancedMesh.setMatrixAt(i, dummy.matrix);

                // 根据时间和位置进行动态流光变色
                colorObj.setHSL((time * 0.15 + i * 0.001) % 1, 0.8, 0.6);
                instancedMesh.setColorAt(i, colorObj);
            }

            instancedMesh.instanceMatrix.needsUpdate = true;
            if (instancedMesh.instanceColor) instancedMesh.instanceColor.needsUpdate = true;

            renderer.render(scene, camera);
        }

        // 启动动画
        animate();
    </script>
</body>
</html>
